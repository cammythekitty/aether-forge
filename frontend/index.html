<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Æther Forge</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- Rune circle -->
  <div id="rune-ring" class="rune-ring">
    <span class="rune" style="--i:0">ᚠ</span>
    <span class="rune" style="--i:1">ᚢ</span>
    <span class="rune" style="--i:2">ᚦ</span>
    <span class="rune" style="--i:3">ᚨ</span>
    <span class="rune" style="--i:4">ᚱ</span>
    <span class="rune" style="--i:5">ᚷ</span>
    <span class="rune" style="--i:6">ᚹ</span>
    <span class="rune" style="--i:7">ᛁ</span>
    <span class="rune" style="--i:8">ᛃ</span>
    <span class="rune" style="--i:9">ᛇ</span>
    <span class="rune" style="--i:10">ᛚ</span>
    <span class="rune" style="--i:11">ᛟ</span>
  </div>

  <!-- Main content -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="header">
      <div id="rune-corner" class="rune-corner">
        <span>ᚠ</span><span>ᚢ</span><span>ᚦ</span>
        <span>ᚨ</span><span>ᚱ</span><span>ᚷ</span>
      </div>
      <div class="header-title">
        <span class="title-text">Æ T H E R &nbsp; F O R G E</span>
        <span class="subtitle">Powered by Vaelora Systems</span>
      </div>
      <div class="status-dot" id="status-dot" title="Connected"></div>
    </header>

    <!-- Output log -->
    <div id="output" class="output"></div>

    <!-- Input area -->
    <div class="input-area">
      <span class="prompt-symbol">⟁</span>
      <input
        id="forge-input"
        class="forge-input"
        type="text"
        placeholder="command the forge..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="voice-btn" class="voice-btn" title="Push to talk">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="/src/main.js"></script>
</body>
</html>
